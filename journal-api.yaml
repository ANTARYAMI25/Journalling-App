openapi: 3.0.0
servers:
  # Added by API Auto Mocking Plugin
  - description: Journal Therapy
    url: https://virtserver.swaggerhub.com/own-e84/Journalling_for_therapy/1.0.0
info:
  title: Therapy Journalling API
  description: >
    API for a therapy journalling platform where clients can log emotions,
    connect with therapists, manage journal access, and book sessions.
  version: 1.0.0
tags:
  - name: Auth
    description: Login and account creation for both client & therapist
  - name: Clients
    description: Client profile management
  - name: Therapists
    description: Therapist profile management
  - name: Journals
    description: Emotion journal entries owned by a client
  - name: Mappings
    description: Relationships between a client and their therapists
  - name: Sessions
    description: Therapy sessions created and managed by therapists
  - name: Messages
    description: In-app messaging between clients and therapists

paths:

  /auth/register:
    post:
      operationId: registerAccount
      tags: [Auth]
      summary: Register a new account (client or therapist)
      description: A single registration endpoint that accepts a role field.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created successfully
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AuthResponseClient'
                  - $ref: '#/components/schemas/AuthResponseTherapist'
                discriminator:
                  propertyName: role
                  mapping:
                    client: '#/components/schemas/AuthResponseClient'
                    therapist: '#/components/schemas/AuthResponseTherapist'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already registered
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /auth/login:
    post:
      operationId: loginUser
      tags: [Auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful — returns JWT token with user object
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AuthResponseClient'
                  - $ref: '#/components/schemas/AuthResponseTherapist'
                discriminator:
                  propertyName: role
                  mapping:
                    client: '#/components/schemas/AuthResponseClient'
                    therapist: '#/components/schemas/AuthResponseTherapist'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /clients:
    get:
      operationId: getAllClients
      tags: [Clients]
      summary: List all clients
      responses:
        '200':
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Client'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /clients/{clientId}:
    get:
      operationId: getClientById
      tags: [Clients]
      summary: Get a client's profile By id
      parameters:
        - $ref: '#/components/parameters/ClientIdParam'
      responses:
        '200':
          description: Client profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

    put:
      operationId: updateClientProfile
      tags: [Clients]
      summary: Update a client's profile
      parameters:
        - $ref: '#/components/parameters/ClientIdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientInput'
      responses:
        '200':
          description: Updated client profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

    delete:
      operationId: deleteClientAccount
      tags: [Clients]
      summary: Delete a client account
      parameters:
        - $ref: '#/components/parameters/ClientIdParam'
      responses:
        '204':
          description: Account deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'


  /therapists:
    get:
      operationId: searchTherapists
      tags: [Therapists]
      summary: List or search therapists
      description: |
        Clients can list all therapists or filter therapists by location
        and specialization.
      parameters:
        - in: query
          name: specialization
          schema:
            type: string
          required: false
          example: Anxiety
          description: Search therapists by expertise
      responses:
        '200':
          description: List of therapists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Therapist'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /therapists/{therapistId}:
    get:
      operationId: getTherapistById
      tags: [Therapists]
      summary: Get a therapist's profile
      parameters:
        - $ref: '#/components/parameters/TherapistIdParam'
      responses:
        '200':
          description: Therapist profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Therapist'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    put:
      operationId: updateTherapistProfile
      tags: [Therapists]
      summary: Update a therapist's profile
      parameters:
        - $ref: '#/components/parameters/TherapistIdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TherapistInput'
      responses:
        '200':
          description: Updated therapist profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Therapist'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    delete:
      operationId: deleteTherapistAccount
      tags: [Therapists]
      summary: Delete a therapist account
      parameters:
        - $ref: '#/components/parameters/TherapistIdParam'
      responses:
        '204':
          description: Account deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'


  /journals/clients/{clientId}:
    post:
      operationId: createJournalEntry
      tags: [Journals]
      summary: Add a new journal entry (emotion record)
      parameters:
        - $ref: '#/components/parameters/ClientIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JournalInput'
      responses:
        '201':
          description: Journal entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Journal'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    get:
      operationId: getClientJournals
      tags: [Journals]
      summary: List all journal entries for a client
      description: Accessible by the client themselves, or by a therapist who has been granted journal access.
      parameters:
        - $ref: '#/components/parameters/ClientIdParam'
      responses:
        '200':
          description: List of journals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Journal'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /journals/{journalId}/clients/{clientId}:
    get:
      operationId: getJournalEntry
      tags: [Journals]
      summary: Get a single journal
      parameters:
        - $ref: '#/components/parameters/ClientIdParam'
        - $ref: '#/components/parameters/JournalIdParam'
      responses:
        '200':
          description: Journal entry detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Journal'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    put:
      operationId: updateJournalEntry
      tags: [Journals]
      summary: Update a journal entry
      parameters:
        - $ref: '#/components/parameters/ClientIdParam'
        - $ref: '#/components/parameters/JournalIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JournalInput'
      responses:
        '200':
          description: Updated journal entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Journal'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    delete:
      operationId: deleteJournalEntry
      tags: [Journals]
      summary: Delete a journal
      parameters:
        - $ref: '#/components/parameters/ClientIdParam'
        - $ref: '#/components/parameters/JournalIdParam'
      responses:
        '204':
          description: Entry deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /journals/journal-ids/clients/{clientId}:
    get:
      operationId: getClientJournalIds
      tags: [Journals]
      summary: Get all journal IDs of a client
      description: |
        Returns only the list of journal IDs belonging to a client.
        Used by therapists to discover available journal entries.
      parameters:
        - $ref: '#/components/parameters/ClientIdParam'
      responses:
        '200':
          description: List of journal IDs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalIdsResponse'

        '400':
          $ref: '#/components/responses/BadRequest'

        '403':
          $ref: '#/components/responses/Forbidden'

        '404':
          $ref: '#/components/responses/NotFound'

        '500':
          $ref: '#/components/responses/InternalServerError'

        '503':
          $ref: '#/components/responses/ServiceUnavailable'


  /journals/{journalId}/access/therapists/{therapistId}:
    put:
      operationId: requestJournalAccess
      tags: [Journals]
      summary: Therapist requests access to a specific journal
      parameters:
        - $ref: '#/components/parameters/JournalIdParam'
        - $ref: '#/components/parameters/TherapistIdParam'
      responses:
        '201':
          description: Access request created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalAccessRequest'
        '409':
          description: Access request already exists
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'


  /journals/{journalId}/therapists/{therapistId}:
    get:
      operationId: getJournalWithAccess
      tags: [Journals]
      summary: Get a journals which access approved by client to therapists
      parameters:
        - $ref: '#/components/parameters/JournalIdParam'
        - $ref: '#/components/parameters/TherapistIdParam'
      responses:
        '200':
          description: Journal entry detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Journal'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /journals/therapists/{therapistId}/clients/{clientId}:
    get:
      operationId: getAccessibleJournalsForTherapist
      tags: [Journals]
      summary: List accessible journals of a client for a therapist
      description: |
        Returns all journal entries of a client where access has been granted
        to the therapist. Optionally filter journals by entry timestamp.
      parameters:
        - $ref: '#/components/parameters/TherapistIdParam'
        - $ref: '#/components/parameters/ClientIdParam'
        - name: entryTimestamp
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Filter journals by exact entry timestamp
      responses:
        '200':
          description: List of accessible journal entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Journal'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /journals/search:
    get:
      operationId: searchJournalsByFeeling
      tags: [Journals]
      summary: Search journals by keyword in emotion field
      description: Returns all journal entries where the `emotion` field contains the specified keyword.
      parameters:
        - name: feeling
          in: query
          required: true
          schema:
            type: string
          description: Keyword to search in the feelings field
      responses:
        '200':
          description: List of matching journal entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Journal'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /mapping/clients/{clientId}/therapists:
    get:
      operationId: getClientTherapists
      tags: [Mappings]
      summary: List all therapists related to this client
      description: Returns therapists that are mapped to this client
      parameters:
        - $ref: '#/components/parameters/ClientIdParam'
      responses:
        '200':
          description: List of therapist mappings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Mapping'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /mapping/therapists/{therapistId}/clients:
    get:
      operationId: getTherapistClients
      tags: [Mappings]
      summary: List all clients mapped to a therapist
      description: Returns all clients that are mapped to this therapist
      parameters:
        - $ref: '#/components/parameters/TherapistIdParam'
      responses:
        '200':
          description: List of client mappings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Mapping'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /mapping/clients/{clientId}/therapists/{therapistId}:
    post:
      operationId: createClientTherapistMapping
      tags: [Mappings]
      summary: Client maps a therapist to their account
      description: Client searches and selects a therapist from the platform.Creates a mapping between them.
      parameters:
        - $ref: '#/components/parameters/ClientIdParam'
        - $ref: '#/components/parameters/TherapistIdParam'
      responses:
        '201':
          description: Mapping created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mapping'
        '409':
          description: Mapping already exists
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    get:
      operationId: getMappingDetails
      tags: [Mappings]
      summary: Get mapping details between a specific client and therapist
      parameters:
        - $ref: '#/components/parameters/ClientIdParam'
        - $ref: '#/components/parameters/TherapistIdParam'
      responses:
        '200':
          description: Mapping details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mapping'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    put:
      operationId: updateMappingStatus
      tags: [Mappings]
      summary: Client approves or rejects therapist mapping
      parameters:
        - $ref: '#/components/parameters/ClientIdParam'
        - $ref: '#/components/parameters/TherapistIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [approved, rejected]
      responses:
        '200':
          description: Mapping updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mapping'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    delete:
      operationId: deleteClientTherapistMapping
      tags: [Mappings]
      summary: Remove a therapist from client's account entirely
      description: Also automatically revokes journal access.
      parameters:
        - $ref: '#/components/parameters/ClientIdParam'
        - $ref: '#/components/parameters/TherapistIdParam'
      responses:
        '204':
          description: Mapping removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mapping'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /mapping/therapists/{therapistId}/clients/{clientId}:
    post:
      operationId: therapistRequestClientMapping
      tags: [Mappings]
      summary: Therapist sends a mapping request to a client
      description: Therapist initiates the relationship. client must approve separately.
      parameters:
        - $ref: '#/components/parameters/ClientIdParam'
        - $ref: '#/components/parameters/TherapistIdParam'
      responses:
        '200':
          description: Mapping request created (pending)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mapping'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    delete:
      operationId: therapistRemoveClientMapping
      tags: [Mappings]
      summary: Therapist removes a client mapping
      description: Journal access is automatically revoked.
      parameters:
        - $ref: '#/components/parameters/ClientIdParam'
        - $ref: '#/components/parameters/TherapistIdParam'
      responses:
        '204':
          description: Client mapping removed
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /session/therapists/{therapistId}:
    post:
      operationId: createSession
      tags: [Sessions]
      summary: Therapist creates a new session slot
      description: Any client on the platform can later apply for this session. The session includes private notes (therapist-only) and shared notes visible to the booked client (e.g. assignments).
      parameters:
        - $ref: '#/components/parameters/TherapistIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionInput'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /session/{sessionId}/therapists/{therapistId}:
    put:
      operationId: updateSession
      tags: [Sessions]
      summary: Therapist modifies a session's details like approve or reject client request for session
      parameters:
        - $ref: '#/components/parameters/TherapistIdParam'
        - $ref: '#/components/parameters/SessionIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionInput'
      responses:
        '200':
          description: Updated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /session:
    get:
      operationId: getAllAvailableSessions
      tags: [Sessions]
      summary: List all available sessions on the platform
      description: Used by clients to browse and select a session to request an appointment for. Returns only sessions with status = available. Supports filtering by specialization and location.
      parameters:
        - name: specialization
          in: query
          required: false
          schema:
            type: string
          description: Filter sessions by therapist's specialization (e.g., anxiety, depression, trauma, relationship)
          example: "anxiety"
        - name: location
          in: query
          required: false
          schema:
            type: string
          description: Filter sessions by therapist's location (city, region, or online)
          example: "New York"
      responses:
        '200':
          description: List of available sessions matching filters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Session'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'


  /session/{sessionId}/clients/{clientId}:
    put:
      operationId: requestSessionAppointment
      tags: [Sessions]
      summary: Client requests an appointment for an available session
      parameters:
        - $ref: '#/components/parameters/ClientIdParam'
        - $ref: '#/components/parameters/SessionIdParam'
      responses:
        '201':
          description: Appointment request submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '409':
          description: Session is already booked or unavailable
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /session/search:
    get:
      operationId: searchSessionsByNotes
      tags: [Sessions]
      summary: Keyword search across session notes
      description: >
        Searches privateNotes (therapist-only) and sharedNotes by keyword.
        Clients can only search sharedNotes. Therapists can search both,
        scoped to their own sessions.
      parameters:
        - name: keyword
          in: query
          required: true
          schema:
            type: string
          description: Keyword to search for
          example: "anxiety"
        - name: field
          in: query
          required: false
          schema:
            type: string
            enum: [privateNotes, sharedNotes, both]
            default: both
          description: Which notes field to search
        - name: therapistId
          in: query
          required: false
          schema:
            type: string
          description: Scope results to a specific therapist's sessions
        - name: clientId
          in: query
          required: false
          schema:
            type: string
          description: Scope results to a specific client's sessions
      responses:
        '200':
          description: Matching sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Session'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'


  /messages:
    post:
      operationId: sendMessage
      tags: [Messages]
      summary: Send a message between client and therapist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageInput'
      responses:
        '201':
          description: Message sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

    get:
      operationId: getMessageHistory
      tags: [Messages]
      summary: Get message history
      parameters:
        - $ref: '#/components/parameters/ClientIdParam'
        - $ref: '#/components/parameters/TherapistIdParam'
      responses:
        '200':
          description: Message history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

components:

  responses:

    BadRequest:
      description: Invalid request payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient permissions for this action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Requested resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal server error - something went wrong on the server
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: Service temporarily unavailable - please try again later
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'


  parameters:

    ClientIdParam:
      name: clientId
      in: path
      required: true
      schema:
        type: string

    TherapistIdParam:
      name: therapistId
      in: path
      required: true
      schema:
        type: string
      description: Unique identifier of the therapist

    JournalIdParam:
      name: journalId
      in: path
      required: true
      schema:
        type: string
      description: Unique identifier of a journal

    AccessIdParam:
      name: accessId
      in: path
      required: true
      schema:
        type: string
      description: Unique identifier of a journal

    SessionIdParam:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
      description: Unique identifier of a session


  schemas:

    RegisterRequest:
      type: object
      required: [email, password, name, role]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
        role:
          type: string
          enum: [client, therapist]

    AuthResponseClient:
      type: object
      required: [token, client]
      properties:
        token:
          type: string
          description: JWT access token
        client:
          $ref: '#/components/schemas/Client'

    AuthResponseTherapist:
      type: object
      required: [token, therapist]
      properties:
        token:
          type: string
          description: JWT access token
        therapist:
          $ref: '#/components/schemas/Therapist'

    ErrorResponse:
      type: object
      required: [error, message, statusCode]
      properties:
        error:
          type: string
        message:
          type: string
        statusCode:
          type: integer

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string


    ClientInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    Client:
      type: object
      required: [clientId, name, email]
      properties:
        clientId:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time

    TherapistInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        specialization:
          type: string
        bio:
          type: string

    Therapist:
      type: object
      required: [therapistId, name, email]
      properties:
        therapistId:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        specialization:
          type: string
        bio:
          type: string
        createdAt:
          type: string
          format: date-time

    JournalInput:
      type: object
      required: [emotionTime, feeling, intensity]
      properties:
        emotionTime:
          type: string
          format: date-time
          description: When the emotion was experienced
        feeling:
          type: string
          example: Sadness
          description: Emotion label from the vocabulary
        intensity:
          type: string
          enum: [strong, medium, light]
          description: Intensity of the emotion
        notes:
          type: string
          description: Optional note about the emotion

    JournalIdsResponse:
      type: object
      required: [journalIds]
      properties:
        journalIds:
          type: array
          items:
            type: string
          example:
            - jrnl-101
            - jrnl-102
            - jrnl-103

    Journal:
      type: object
      required: [journalId, clientId, emotionTime, feeling, intensity]
      properties:
        journalId:
          type: string
          description: Unique journal identifier
        clientId:
          type: string
          description: Client who owns the journal
        emotionTime:
          type: string
          format: date-time
          description: When the emotion was experienced
        feeling:
          type: string
          description: Emotion label from the vocabulary
        intensity:
          type: string
          enum: [strong, medium, light]
          description: Intensity of the emotion
        notes:
          type: string
          description: A note about the emotion
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    JournalAccessRequest:
      type: object
      required: [requestId, journalId, clientId, therapistId, status, requestedAt]
      properties:
        requestId:
          type: string
          description: Unique access request identifier
        journalId:
          type: string
          description: Requested journal ID
        clientId:
          type: string
          description: Client who owns the journal
        therapistId:
          type: string
          description: Therapist requesting access
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
        requestedAt:
          type: string
          format: date-time
        approvedAt:
          type: string
          format: date-time
        rejectedAt:
          type: string
          format: date-time
        approvedBy:
          type: string
          description: Client who approved access

    Mapping:
      type: object
      required: [mappingId, clientId, therapistId, status]
      description: Represents the relationship between a client and a therapist
      properties:
        mappingId:
          type: string
        clientId:
          type: string
        therapistId:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
          description: Whether the therapist is linked to the client
        createdAt:
          type: string
          format: date-time

    SessionInput:
      type: object
      description: Input for creating or updating a session
      required: [title, scheduledAt, durationMinutes, location]
      properties:
        title:
          type: string
          example: "Anxiety management — intro session"
        therapistId:
          type: string
          description: ID of the therapist conducting the session
        sessionStatus:
          type: string
          enum: [available, booked, rejected, Done]
          description: Current status of the session
        scheduledAt:
          type: string
          format: date-time
          description: When the session is scheduled to start
        durationMinutes:
          type: integer
          example: 60
          description: Length of the session in minutes
        location:
          type: string
        privateNotes:
          type: string
          description: Therapist-only notes — not visible to the client
        sharedNotes:
          type: string
          description: Notes shared with the booked client (assignments, homework, etc.)

    Session:
      type: object
      required:
        - sessionId
        - therapistId
        - title
        - scheduledAt
        - durationMinutes
        - status
        - location
      properties:
        sessionId:
          type: string
        therapistId:
          type: string
        clientId:
          type: string
        title:
          type: string
        scheduledAt:
          type: string
          format: date-time
        durationMinutes:
          type: integer
        location:
          type: string
        status:
          type: string
          enum: [available, booked, completed, cancelled]
        privateNotes:
          type: string
          description: Visible only to the therapist
        sharedNotes:
          type: string
          description: Visible to both the therapist and the booked client
        createdAt:
          type: string
          format: date-time

    MessageInput:
      type: object
      required: [senderId, receiverId, content]
      properties:
        senderId:
          type: string
        receiverId:
          type: string
        content:
          type: string

    Message:
      type: object
      required:
        - messageId
        - conversationId
        - senderId
        - receiverId
        - content
        - timestamp
      properties:
        messageId:
          type: string
        conversationId:
          type: string
        senderId:
          type: string
        receiverId:
          type: string
        content:
          type: string
        timestamp:
          type: string
          format: date-time
